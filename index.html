function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            const maxSize = 100;
            if (width > height) {
                if (width > maxSize) {
                    height = height * (maxSize / width);
                    width = maxSize;
                }
            } else {
                if (height > maxSize) {
                    width = width * (maxSize / height);
                    height = maxSize;
                }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const compressedData = canvas.toDataURL('image/jpeg', 0.7);
            callback(compressedData);
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}

function playSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.08;
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
        oscillator.stop(audioCtx.currentTime + 0.3);
    } catch(e) { }
}

            contentHtml = `<img src="${m.imageUrl}" class="media-img" onclick="window.open('${m.imageUrl}','_blank')">`;
        } else if (m.type === 'video' && m.videoUrl) {
            contentHtml = `<video src="${m.videoUrl}" class="media-video" controls></video>`;
        } else {
            contentHtml = `<div class="text">${escapeHtml(m.content)}</div>`;
        }
        let replyHtml = '';
        if (m.replyTo) {
            let preview = m.replyTo.content;
            if (preview.length > 30) preview = preview.slice(0,30)+'...';
            replyHtml = `<div class="reply-preview">↳ 回复 "${escapeHtml(preview)}"</div>`;
        }
        div.innerHTML = `<div class="bubble">${replyHtml}${contentHtml}<div class="time"><span>${timeStr}</span> <span class="${m.read ? 'read' : ''}">${m.read ? '✓✓ 已读' : '✓ 未读'}</span></div></div>`;
        container.appendChild(div);
    }
    container.scrollTop = container.scrollHeight;
}

function showActionMenu(msgIdx, x, y, isFromMe) {
    const existing = document.querySelector('.action-menu');
    if (existing) existing.remove();
    
    const menu = document.createElement('div');
    menu.className = 'action-menu';
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    
    menu.innerHTML = `<div class="action-menu-item" id="menu-reply">💬 引用回复</div><div class="action-menu-item" id="menu-delete">🗑️ 删除消息</div>`;
    setTimeout(() => {
        const replyBtn = document.getElementById('menu-reply');
        const deleteBtn = document.getElementById('menu-delete');
        if (replyBtn) {
            replyBtn.onclick = (e) => {
                e.stopPropagation();
                replyingTo = { idx: msgIdx, content: messages[msgIdx].content };
                const input = document.getElementById('msgInput');
                input.placeholder = `回复 "${replyingTo.content.slice(0,30)}..."`;
                input.focus();
                menu.remove();
            };
        }
        if (deleteBtn) {
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                messages.splice(msgIdx, 1);
                renderMsgs();
                saveMsgs();
                menu.remove();
            };
        }
    }, 10);
    document.body.appendChild(menu);
    setTimeout(() => { if (menu.parentNode) menu.remove(); }, 5000);
}

function saveMsgs() { localStorage.setItem('msgs', JSON.stringify(messages)); }

function addMsg(content, fromMe = true, type = 'text', mediaUrl = null) {
    const replyData = replyingTo ? { idx: replyingTo.idx, content: replyingTo.content } : null;
    let msg = { id: Date.now(), content, fromMe, time: Date.now(), read: false, type, replyTo: replyData };
    if (type === 'image') msg.imageUrl = mediaUrl;
    if (type === 'video') msg.videoUrl = mediaUrl;
    if (type === 'emoji') msg.emojiData = mediaUrl;
    messages.push(msg);
    replyingTo = null;
    const input = document.getElementById('msgInput');
    if (input) input.placeholder = `输入文字... 长按消息可删除或引用`;
    renderMsgs();
    saveMsgs();
    if (fromMe) {
        setTimeout(() => { msg.read = true; renderMsgs(); saveMsgs(); }, 1000);
        if (!isReplying && type !== 'poke') autoReply();
    } else {
        msg.read = true; renderMsgs(); saveMsgs();
        playSound();
    }
}

    div.id = 'typingDiv';
    div.className = 'row other';

    container.appendChild(div);

}
function hideTyping() { const el = document.getElementById('typingDiv'); if (el) el.remove(); }

function sendRandomMessage() {
    const sendEmoji = emojis.length > 0 && Math.random() < 0.25;
    if (sendEmoji) {
        const randomEmojiData = randomEmoji();
        if (randomEmojiData) {
            addMsg('[表情包]', false, 'emoji', randomEmojiData.data);
            return;
        }
    }
    const isVoice = Math.random() < 0.3;
    if (isVoice) {
        addMsg(randomVoice(), false, 'voice');
    } else {
        addMsg(randomCard(), false);
    }
}

function autoReply() {
    if (isReplying) return;
    isReplying = true;
    showTyping();
    const thinkTime = Math.random() * 40000 + 20000;
    setTimeout(() => {
        hideTyping();
        const count = Math.floor(Math.random() * 5) + 1;
        let sent = 0;
        function sendNext() {
            if (sent < count) {
                sendRandomMessage();
                sent++;
                const interval = Math.random() * 2500 + 1500;
                setTimeout(sendNext, interval);
            } else {
                isReplying = false;
            }
        }
        sendNext();
    }, thinkTime);
}

function scheduleActive() {
    if (activeTimer) clearTimeout(activeTimer);
    const delay = Math.random() * 90000 + 60000;
    activeTimer = setTimeout(() => {
        showTyping();
        setTimeout(() => { 
            hideTyping(); 
            sendRandomMessage();
            scheduleActive(); 
        }, 2000);
    }, delay);
}

function sendText() {
    const input = document.getElementById('msgInput');
    if (!input) return;
    const txt = input.value.trim();
    if (txt === '') return;
    addMsg(txt, true);
    input.value = '';
    input.style.height = 'auto';
}

function loadMsgs() {
    const saved = localStorage.getItem('msgs');

    } else {

}

// 随机来电（完全随机概率）
function startRandomCallTimer() {
    if (randomCallTimer) clearTimeout(randomCallTimer);
    const delay = Math.random() * (25 * 60 * 1000 - 30 * 1000) + 30 * 1000;
    randomCallTimer = setTimeout(() => {
        const willCall = Math.random() < 0.4;
        if (willCall && !isCallActive) {
            showIncomingCall();
        }
        startRandomCallTimer();
    }, delay);
}

// 显示来电弹窗（修复按钮事件）
function showIncomingCall() {
    if (isCallActive) return;
    
    // 先清理可能残留的弹窗
    if (currentCallModal) currentCallModal.remove();
    if (currentCallOverlay) currentCallOverlay.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'call-overlay';
    const modal = document.createElement('div');
    modal.className = 'call-modal';
    
    currentCallOverlay = overlay;
    currentCallModal = modal;
    
    let callState = 'incoming';
    let duration = 0;
    let timer = null;
    
    function cleanup() {
        if (timer) clearInterval(timer);
        if (overlay.parentNode) overlay.remove();
        if (modal.parentNode) modal.remove();
        isCallActive = false;
        currentCallModal = null;
        currentCallOverlay = null;
    }
    
    function updateUI() {
        if (callState === 'incoming') {
            modal.innerHTML = `<h3>📞 语音通话</h3><p style="color:#ffaa44;">📱 ${partner} 邀请你通话...</p><div style="margin:16px 0;">📳 📳 📳</div><div style="display:flex; gap:16px; justify-content:center;"><button class="call-btn call-accept" id="callAcceptBtn" style="background:#4ade80; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">接听</button><button class="call-btn call-reject" id="callRejectBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">拒绝</button></div>`;
            
            const acceptBtn = document.getElementById('callAcceptBtn');
            const rejectBtn = document.getElementById('callRejectBtn');
            
            if (acceptBtn) {
                acceptBtn.onclick = function(e) {
                    e.stopPropagation();
                    callState = 'connected';
                    updateUI();
                    startTimer();
                };
            }
            if (rejectBtn) {
                rejectBtn.onclick = function(e) {
                    e.stopPropagation();
                    cleanup();
                };
            }
        } else if (callState === 'connected') {
            isCallActive = true;
            modal.innerHTML = `<h3>📞 语音通话中</h3><div style="margin:16px 0; padding:16px; background:#2a2a35; border-radius:16px;"><div style="font-size:40px;">🎙️</div><div>与 ${partner} 通话中...</div><div style="font-size:12px; margin-top:8px;"><span id="callSeconds">0</span>秒</div></div><button class="call-btn call-reject" id="callEndBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">挂断</button>`;
            
            const endBtn = document.getElementById('callEndBtn');
            if (endBtn) {
                endBtn.onclick = function(e) {
                    e.stopPropagation();
                    cleanup();
                };
            }
            
            function updateSeconds() {
                if (callState === 'connected') {
                    const secSpan = document.getElementById('callSeconds');
                    if (secSpan) secSpan.innerText = duration;
                    requestAnimationFrame(updateSeconds);
                }
            }
            updateSeconds();
        }
    }
    
    function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(function() { 
            if (callState === 'connected') duration++; 
        }, 1000);
    }
    
    updateUI();
    document.body.appendChild(overlay);
    document.body.appendChild(modal);
}

function startCall(type, isIncoming = false) {
    if (isCallActive) return;
    const isVideo = type === 'video';
    const overlay = document.createElement('div'); overlay.className = 'call-overlay';
    const modal = document.createElement('div'); modal.className = 'call-modal';
    let state = isIncoming ? 'incoming' : 'dialing';
    let duration = 0;
    let timer = null;
    
    function cleanup() {
        if (timer) clearInterval(timer);
        if (overlay.parentNode) overlay.remove();
        if (modal.parentNode) modal.remove();
        isCallActive = false;
    }
    
    function updateUI() {
        if (state === 'dialing') {
            modal.innerHTML = `<h3>${isVideo ? '🎥 视频通话' : '📞 语音通话'}</h3><p>正在呼叫 ${partner}...</p><div style="margin:16px 0;">●●●</div><button class="call-btn call-reject" id="callCancelBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">取消</button>`;
            const btn = document.getElementById('callCancelBtn');
            if (btn) btn.onclick = () => cleanup();
        } else if (state === 'incoming') {
            modal.innerHTML = `<h3>${isVideo ? '🎥 视频通话' : '📞 语音通话'}</h3><p style="color:#ffaa44;">📱 ${partner} 邀请你通话...</p><div style="margin:16px 0;">📳 📳 📳</div><div style="display:flex; gap:16px; justify-content:center;"><button class="call-btn call-accept" id="callAcceptBtn" style="background:#4ade80; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">接听</button><button class="call-btn call-reject" id="callRejectBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">拒绝</button></div>`;
            const acceptBtn = document.getElementById('callAcceptBtn');
            const rejectBtn = document.getElementById('callRejectBtn');
            if (acceptBtn) acceptBtn.onclick = () => { state = 'connected'; updateUI(); startTimer(); };
            if (rejectBtn) rejectBtn.onclick = () => cleanup();
        } else if (state === 'ringing') {
            modal.innerHTML = `<h3>${isVideo ? '🎥 视频通话' : '📞 语音通话'}</h3><p style="color:#ffaa44;">📱 ${partner} 正在振铃...</p><div style="margin:16px 0;">📳 📳 📳</div><button class="call-btn call-reject" id="callHangupBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">挂断</button>`;
            const btn = document.getElementById('callHangupBtn');
            if (btn) btn.onclick = () => cleanup();
            setTimeout(() => {
                if (state === 'ringing') {
                    state = 'connected';
                    updateUI();
                    startTimer();
                }
            }, 2500);
        } else if (state === 'connected') {
            isCallActive = true;
            modal.innerHTML = `<h3>${isVideo ? '🎥 视频通话中' : '📞 语音通话中'}</h3><div style="margin:16px 0; padding:16px; background:#2a2a35; border-radius:16px;"><div style="font-size:40px;">${isVideo ? '📹' : '🎙️'}</div><div>与 ${partner} 通话中...</div><div style="font-size:12px; margin-top:8px;"><span id="callSeconds">0</span>秒</div></div><button class="call-btn call-reject" id="callEndBtn" style="background:#ff6b6b; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">挂断</button>`;
            const endBtn = document.getElementById('callEndBtn');
            if (endBtn) endBtn.onclick = () => cleanup();
            function updateSeconds() {
                if (state === 'connected') {
                    const secSpan = document.getElementById('callSeconds');
                    if (secSpan) secSpan.innerText = duration;
                    requestAnimationFrame(updateSeconds);
                }
            }
            updateSeconds();
        }
    }
    
    function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(() => { if (state === 'connected') duration++; }, 1000);
    }
    
    updateUI();
    document.body.appendChild(overlay);
    document.body.appendChild(modal);
    
    if (state === 'dialing') {
        setTimeout(() => {
            if (state === 'dialing') {
                state = 'ringing';
                updateUI();
            }
        }, 1500);
    }
}
function playMusic() {
    let url = prompt('输入音乐链接（MP3地址）', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    if (url) {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(url);

        currentAudio.play().then(() => addMsg('🎵 开始播放音乐', true)).catch(() => alert('无法播放该链接'));

function setBackground(type, customUrl = null) {
    const appDiv = document.querySelector('.app');
    if (type === 'default') {
        appDiv.style.background = '#f5f0ff';
        localStorage.setItem('chatBackground', 'default');
        localStorage.removeItem('customBg');
    } else if (type === 'gradient') {
        appDiv.style.background = 'linear-gradient(145deg, #e9daf9, #c3e2f7)';
        localStorage.setItem('chatBackground', 'gradient');
        localStorage.removeItem('customBg');
    } else if (type === 'dark') {
        appDiv.style.background = '#0f0f14';
        localStorage.setItem('chatBackground', 'dark');
        localStorage.removeItem('customBg');
    } else if (type === 'custom' && customUrl) {
        appDiv.style.background = `url(${customUrl}) center/cover no-repeat`;
        localStorage.setItem('chatBackground', 'custom');
        localStorage.setItem('customBg', customUrl);
    }
}

function loadSavedBackground() {
    const savedBgType = localStorage.getItem('chatBackground');
    const savedCustomBg = localStorage.getItem('customBg');
    const appDiv = document.querySelector('.app');
    
    if (savedBgType === 'default') {
        appDiv.style.background = '#f5f0ff';
    } else if (savedBgType === 'gradient') {
        appDiv.style.background = 'linear-gradient(145deg, #e9daf9, #c3e2f7)';
    } else if (savedBgType === 'dark') {
        appDiv.style.background = '#0f0f14';
    } else if (savedBgType === 'custom' && savedCustomBg) {
        appDiv.style.background = `url(${savedCustomBg}) center/cover no-repeat`;
    }
}

            const div = document.createElement('div');
            div.className = 'emoji-img-item';
            div.innerHTML = `<img src="${e.data}" style="width:50px;height:50px;border-radius:12px;"><button class="del-btn">✖</button>`;
            div.querySelector('.del-btn').onclick = (ev) => { 
                ev.stopPropagation(); 
                emojis.splice(i,1); 
                localStorage.setItem('emojis', JSON.stringify(emojis)); 
                renderEmojiPanel();
                checkStorageSpace();
            };
            div.onclick = () => { addMsg('[图片]', true, 'emoji', e.data); closePanel(); };
            panel.appendChild(div);
        });
        const add = document.createElement('div');
        add.className = 'card';
        add.innerHTML = '+ 添加表情';
        add.onclick = () => {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = 'image/*';
            inp.onchange = (ev) => {
                const file = ev.target.files[0];
                if (file) {
                    compressImage(file, (compressedData) => {
                        emojis.push({ name: file.name, data: compressedData });
                        localStorage.setItem('emojis', JSON.stringify(emojis));
                        renderEmojiPanel();
                        checkStorageSpace();
                    });
                }
            };
            inp.click();
        };
        panel.appendChild(add);
    };
    
    const renderPokePanel = () => {
        const panel = document.getElementById('pokePanel');
        if (!panel) return;
        panel.innerHTML = '';
        pokes.forEach((p, i) => {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `${p} <button class="del-btn">✖</button>`;
            div.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); pokes.splice(i,1); localStorage.setItem('pokes', JSON.stringify(pokes)); renderPokePanel(); };
            div.onclick = () => { addMsg(`✨ ${my} ${p} ✨`, true); closePanel(); setTimeout(()=>{ if(Math.random()>0.5) addMsg(`✨ ${partner} ${pokes[Math.floor(Math.random()*pokes.length)]} ✨`, false); }, 2000); };
            panel.appendChild(div);
        });
        const add = document.createElement('div'); add.className = 'card'; add.innerHTML = '+ 添加拍一拍';
        add.onclick = () => { let newPoke = prompt('新动作（如：拍了拍对方的头）'); if(newPoke) { pokes.push(newPoke); localStorage.setItem('pokes', JSON.stringify(pokes)); renderPokePanel(); } };
        panel.appendChild(add);
    };
    
    const closePanel = () => { document.getElementById('panel').classList.add('hidden'); };
    const showPanel = (mode) => {
        document.getElementById('emojiPanel').classList.add('hidden');
        document.getElementById('cardPanel').classList.add('hidden');
        document.getElementById('pokePanel').classList.add('hidden');
        document.getElementById('bgPanel').classList.add('hidden');
        document.getElementById('voicePanel').classList.add('hidden');
        if (mode === 'emoji') { document.getElementById('emojiPanel').classList.remove('hidden'); renderEmojiPanel(); }
        else if (mode === 'card') { document.getElementById('cardPanel').classList.remove('hidden'); renderCardPanel(); }
        else if (mode === 'poke') { document.getElementById('pokePanel').classList.remove('hidden'); renderPokePanel(); }
        else if (mode === 'bg') { document.getElementById('bgPanel').classList.remove('hidden'); }
        document.getElementById('panel').classList.remove('hidden');
    };
    
    document.getElementById('showEmoji').onclick = () => showPanel('emoji');
    document.getElementById('showCard').onclick = () => showPanel('card');
    document.getElementById('showPoke').onclick = () => showPanel('poke');
    document.getElementById('showBgBtn').onclick = () => showPanel('bg');
    
    document.onclick = (e) => {
        const panel = document.getElementById('panel');
        const emojiBtn = document.getElementById('showEmoji');
        const cardBtn = document.getElementById('showCard');
        const pokeBtn = document.getElementById('showPoke');
        const bgBtn = document.getElementById('showBgBtn');
        const voiceBtn = document.getElementById('sendVoiceBtn');
        if (panel && !panel.contains(e.target) && e.target !== emojiBtn && e.target !== cardBtn && e.target !== pokeBtn && e.target !== bgBtn && e.target !== voiceBtn) closePanel();
        const menu = document.querySelector('.action-menu');
        if (menu && !menu.contains(e.target)) menu.remove();
    };
    
    const input = document.getElementById('msgInput');
    input.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } };
    input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 80) + 'px'; });
    document.getElementById('sendBtn').onclick = sendText;
    
    loadMsgs();
    scheduleActive();
}
setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.remove();
            document.getElementById('app').style.display = 'flex';
            initUI();
        }, 500);
    } else {
        document.getElementById('app').style.display = 'flex';
        initUI();
    }
}, 1500);
</script>
</body>
</html>
